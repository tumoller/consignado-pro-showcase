# Compose de referência da wuzapi (WhatsApp API não-oficial, Go/whatsmeow).
# Corrigido em 2026-07-12 após checar o compose real do repo (asternic/wuzapi @ main) —
# a versão atual EXIGE Postgres (sem fallback SQLite) e chaves de criptografia/HMAC.
#
# IMPORTANTE: na Railway NÃO se sobe compose — cada serviço (wuzapi, Postgres) é criado
# individualmente. Este arquivo serve para (a) testar local e (b) documentar as variáveis
# exatas. Ver o mapeamento Railway em docs/specs/2026-07-12-plano-wuzapi-railway.md.

services:
  wuzapi:
    build:
      context: ./wuzapi-src   # git clone https://github.com/asternic/wuzapi.git ./wuzapi-src
      dockerfile: Dockerfile
    container_name: wuzapi
    restart: on-failure
    ports:
      - "${WUZAPI_PORT:-8080}:8080"
    environment:
      # --- obrigatórios ---
      WUZAPI_ADMIN_TOKEN: ${WUZAPI_ADMIN_TOKEN}                  # token admin (cria/gerencia instâncias)
      WUZAPI_GLOBAL_ENCRYPTION_KEY: ${WUZAPI_GLOBAL_ENCRYPTION_KEY} # AES-256, precisa ter EXATAMENTE 32 caracteres
      DB_USER: ${DB_USER:-wuzapi}
      DB_PASSWORD: ${DB_PASSWORD:-wuzapi}
      DB_NAME: ${DB_NAME:-wuzapi}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      # --- recomendados ---
      WUZAPI_GLOBAL_HMAC_KEY: ${WUZAPI_GLOBAL_HMAC_KEY:-}        # min 32 chars; assina o webhook (nosso lado ignora, é opcional mas seguro deixar)
      WEBHOOK_FORMAT: json
      TZ: America/Sao_Paulo
      SESSION_DEVICE_NAME: Aurus
      # WUZAPI_GLOBAL_WEBHOOK: fallback global — deixamos vazio pois o create-instance.js
      # do dashboard já envia o webhook por instância na criação.
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - wuzapi_files:/app/files            # mídias recebidas/baixadas (a sessão fica no Postgres agora, não em arquivo)

  db:
    image: postgres:16
    container_name: wuzapi-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-wuzapi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wuzapi}
      POSTGRES_DB: ${DB_NAME:-wuzapi}
    volumes:
      - wuzapi_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wuzapi}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wuzapi_files:
  wuzapi_pg:
